services:
  - type: web
    name: clinical-copilot
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LLM_MODEL
        value: "groq/llama-3.3-70b-versatile"
      - key: ANTHROPIC_API_KEY
        sync: false # set in Render dashboard under Environment -> Secret Files
      - key: WANDB_PROJECT
        value: "clinical-copilot"
      - key: WANDB_ENTITY
        value: "" # optional - set in dashboard if using a W&B org/team
      - key: WANDB_API_KEY
        sync: false # optional - missing key runs the server in degraded (no tracing) mode
      - key: API_KEY
        sync: false # optional - enables X-API-Key auth on all endpoints when set
      - key: GROQ_API_KEY
        sync: false # optional - set in Render dashboard under Environment -> Secret Files
      - key: WANDB_ENABLED
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "" # set to the deployed Render URL in dashboard; single-origin deploy means this is a defensive default, not load-bearing
